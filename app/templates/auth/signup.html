{% extends "base.html" %}
{% block title %}Crear cuenta — Agente Personal{% endblock %}
{% block content %}
<main class="flex min-h-screen items-center justify-center px-4">
  <div class="w-full max-w-sm space-y-6">
    <div class="text-center">
      <h1 class="text-2xl font-semibold tracking-tight">Crear cuenta</h1>
      <p class="mt-1 text-sm text-neutral-500">Crea tu cuenta para comenzar a usar el agente.</p>
    </div>
    {% include "partials/signup_form.html" %}

      ¿Ya tienes cuenta? <a href="/login" class="text-blue-600 hover:underline">Iniciar sesión</a>
    </p>
  </div>
</main>
{% endblock %}
