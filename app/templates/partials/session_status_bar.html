<div id="session-status-bar" class="flex items-center border-b border-neutral-200 px-3 py-2 dark:border-neutral-800"{% if oob %} hx-swap-oob="true"{% endif %}>
  <span class="flex-1 truncate text-xs text-neutral-500">
    {% if current_session_id %}Sesión activa{% else %}Sin sesión{% endif %}
  </span>
  {% if current_session_id %}
  <button hx-post="/api/sessions/{{ current_session_id }}/clear" hx-target="#messages" hx-swap="innerHTML" class="rounded-md px-2 py-1 text-xs text-red-500 hover:bg-red-50 hover:text-red-700 dark:hover:bg-red-900/20">
    Limpiar
  </button>
  {% endif %}
</div>
