<div id="confirmation-panel" class="mt-3 rounded-md border border-amber-300 p-3 text-xs">
  <p>Confirmación requerida para {{ msg.structured_payload["tool_name"] }}</p>
  <div class="mt-2 flex gap-2">
    <button hx-post="/api/chat/confirm"
            hx-vals='{"tool_call_id": "{{ msg.structured_payload["tool_call_id"] }}", "action": "approve"}'
            hx-target="#messages"
            hx-swap="beforeend"
            class="rounded-md bg-green-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-green-700">
      Aprobar
    </button>
    <button hx-post="/api/chat/confirm"
            hx-vals='{"tool_call_id": "{{ msg.structured_payload["tool_call_id"] }}", "action": "reject"}'
            hx-target="#messages"
            hx-swap="beforeend"
            class="rounded-md bg-red-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-red-700">
      Cancelar
    </button>
  </div>
</div>
