<span class="inline-block rounded-full px-2 py-0.5 text-xs font-medium
  {% if risk == 'low' %}bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400{% endif %}
  {% if risk == 'medium' %}bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400{% endif %}
  {% if risk == 'high' %}bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400{% endif %}">
  {{ risk }}
</span>
