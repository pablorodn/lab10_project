<div class="group relative" data-session-item id="session-item-{{ session.id }}"{% if oob %} hx-swap-oob="{{ oob if oob is string else 'true' }}"{% endif %}>
  <button hx-get="/chat/session/{{ session.id }}"
          hx-vals='{"current_session_id": "{{ current_session_id }}"}'
          hx-target="#messages"
          hx-swap="innerHTML"
          hx-disabled-elt="this"
          class="w-full rounded-md px-3 py-2 pr-8 text-left text-sm disabled:opacity-50 {% if session.id == current_session_id %}bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300{% else %}text-neutral-600 hover:bg-neutral-50 dark:text-neutral-400 dark:hover:bg-neutral-900{% endif %}">
    <div class="truncate font-medium text-xs">
      {% if session.title %}
        {{ session.title }}
      {% elif session.created_at %}
        {# created_at (fecha de creacion, estable) en vez de last_used_at: la fecha
           que ve el usuario debe identificar la conversacion, no su actividad --
           last_used_at cambia en cada GET /chat (touch_session) y haria "saltar" la
           fecha mostrada a la hora actual en cada visita, lo cual confunde. #}
        {{ session.created_at | format_session_date }}
      {% else %}
        Nueva sesión
      {% endif %}
    </div>
  </button>
  <button type="button" onclick="toggleSessionMenu('{{ session.id }}')" title="Más opciones"
          class="absolute right-1 top-1/2 -translate-y-1/2 rounded px-1 py-0.5 text-xs text-neutral-400 opacity-0 hover:bg-neutral-200 hover:text-neutral-700 group-hover:opacity-100 dark:hover:bg-neutral-700 dark:hover:text-neutral-200">⋮</button>
  <div id="session-menu-{{ session.id }}" class="hidden absolute right-1 top-7 z-10 w-32 rounded-md border border-neutral-200 bg-white py-1 text-xs shadow-lg dark:border-neutral-700 dark:bg-neutral-800">
    <button type="button"
            hx-post="/api/sessions/{{ session.id }}/archive"
            hx-vals='{"current_session_id": "{{ current_session_id }}"}'
            hx-target="closest [data-session-item]"
            hx-swap="outerHTML"
            hx-disabled-elt="this"
            class="block w-full px-3 py-1.5 text-left hover:bg-neutral-100 disabled:opacity-50 dark:hover:bg-neutral-700">
      Archivar
    </button>
    <button type="button"
            hx-post="/api/sessions/{{ session.id }}/delete"
            hx-vals='{"current_session_id": "{{ current_session_id }}"}'
            hx-target="closest [data-session-item]"
            hx-swap="outerHTML"
            hx-confirm="¿Eliminar esta conversación? Esta acción no se puede deshacer."
            hx-disabled-elt="this"
            class="block w-full px-3 py-1.5 text-left text-red-600 hover:bg-red-50 disabled:opacity-50 dark:text-red-400 dark:hover:bg-red-900/20">
      Eliminar
    </button>
  </div>
</div>
