<div>
  <h2 class="text-lg font-semibold">Tu perfil</h2>
  <p class="text-sm text-neutral-500">Configura tu información básica.</p>
</div>
<div>
  <label for="name" class="block text-sm font-medium mb-1">Nombre</label>
  <input id="name" name="name" type="text" value="{{ data.name }}" class="w-full rounded-md border border-neutral-300 bg-white px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900" />
</div>
<div>
  <label for="timezone" class="block text-sm font-medium mb-1">Zona horaria</label>
  <select id="timezone" name="timezone" class="w-full rounded-md border border-neutral-300 bg-white px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900">
    {% for tz in timezones %}
    <option value="{{ tz }}" {% if data.timezone == tz %}selected{% endif %}>{{ tz }}</option>
    {% endfor %}
  </select>
</div>
<div>
  <label for="language" class="block text-sm font-medium mb-1">Idioma</label>
  <select id="language" name="language" class="w-full rounded-md border border-neutral-300 bg-white px-3 py-2 text-sm dark:border-neutral-700 dark:bg-neutral-900">
    <option value="es" {% if data.language == "es" %}selected{% endif %}>Español</option>
    <option value="en" {% if data.language == "en" %}selected{% endif %}>English</option>
  </select>
</div>
